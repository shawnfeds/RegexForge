name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Run tests before publishing
        run: dotnet test tests/RegexForge.Tests/RegexForge.Tests.csproj -c Release

      - name: Pack (Core)
        run: >
          dotnet pack src/RegexForge.Core/RegexForge.Core.csproj
          -c Release
          -p:Version=${{ steps.version.outputs.version }}
          -o ./artifacts

      - name: Pack (Patterns)
        run: >
          dotnet pack src/RegexForge.Patterns/RegexForge.Patterns.csproj
          -c Release
          -p:Version=${{ steps.version.outputs.version }}
          -o ./artifacts

      - name: Pack (Validation)
        run: >
          dotnet pack src/RegexForge.Validation/RegexForge.Validation.csproj
          -c Release
          -p:Version=${{ steps.version.outputs.version }}
          -o ./artifacts

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ secrets.NUGET_API_KEY }}
          --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true
