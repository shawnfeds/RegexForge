name: Benchmark

on:
  workflow_dispatch:
  push:
    branches: [release/*]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Run benchmarks
        run: >
          dotnet run -c Release
          --project tests/RegexForge.Benchmarks/RegexForge.Benchmarks.csproj
          --framework net8.0
          -- --filter "*"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: BenchmarkDotNet.Artifacts/results/**
