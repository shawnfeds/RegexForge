name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet-version: ['8.0.x', '10.0.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes --severity error

      - name: Build (Core)
        run: dotnet build src/RegexForge.Core/RegexForge.Core.csproj -c Release --no-restore

      - name: Build (Patterns)
        run: dotnet build src/RegexForge.Patterns/RegexForge.Patterns.csproj -c Release --no-restore

      - name: Build (Validation)
        run: dotnet build src/RegexForge.Validation/RegexForge.Validation.csproj -c Release --no-restore
