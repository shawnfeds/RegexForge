name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet-version: ['8.0.x', '10.0.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore
        run: dotnet restore tests/RegexForge.Tests/RegexForge.Tests.csproj

      - name: Test
        run: >
          dotnet test tests/RegexForge.Tests/RegexForge.Tests.csproj
          -c Release
          --no-restore
          --logger "trx;LogFileName=test-results-${{ matrix.dotnet-version }}.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.dotnet-version }}
          path: '**/test-results-*.trx'

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.dotnet-version }}
          path: '**/coverage.cobertura.xml'

  # NOTE: this job intentionally does NOT cover the netstandard2.0 fallback
  # path (the non-GeneratedRegex branch used by .NET Framework consumers).
  # xUnit cannot execute directly against a netstandard2.0 target — it needs
  # a real runtime. The #if NET7_0_OR_GREATER branch is exercised by the
  # net8.0/net10.0 jobs above; the netstandard2.0 branch is currently
  # build-verified only (see build.yml) and is NOT behavior-tested in CI.
  #
  # To close this gap, either:
  #   (a) add a net48 (Windows-only runner) test leg once .NET Framework
  #       support is confirmed as a real v1 requirement, or
  #   (b) extract the fallback Regex construction into a small testable
  #       helper that can be invoked from a netstandard2.0-targeted test
  #       harness on any runtime.
  # Tracked as a known gap rather than silently assumed covered.
  netstandard2-coverage-note:
    runs-on: ubuntu-latest
    steps:
      - name: Coverage gap notice
        run: |
          echo "::warning::netstandard2.0 fallback path (non-GeneratedRegex) is build-verified only, not behavior-tested. See comment in test.yml."
